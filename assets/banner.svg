<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#311042" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="800" height="250" rx="16" fill="url(#bgGrad)" />

  <!-- Decorative Background Shapes -->
  <circle cx="750" cy="50" r="100" fill="#ec4899" opacity="0.15" filter="url(#glow)" />
  <circle cx="50" cy="200" r="80" fill="#3b82f6" opacity="0.15" filter="url(#glow)" />
  
  <!-- Floating Cartoon-Style Accents -->
  <path d="M 680,140 C 690,120 720,120 730,140 C 740,160 710,190 680,180 Z" fill="url(#accentGrad)" opacity="0.25" />
  <path d="M 120,60 C 130,40 160,40 170,60 C 180,80 150,110 120,100 Z" fill="url(#accentGrad)" opacity="0.2" />

  <!-- Grid Pattern Overlay -->
  <path d="M 0,25 L 800,25 M 0,50 L 800,50 M 0,75 L 800,75 M 0,100 L 800,100 M 0,125 L 800,125 M 0,150 L 800,150 M 0,175 L 800,175 M 0,200 L 800,200 M 0,225 L 800,225" stroke="#ffffff" stroke-width="1" opacity="0.05" />
  <path d="M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250 M 400,0 L 400,250 M 450,0 L 450,250 M 500,0 L 500,250 M 550,0 L 550,250 M 600,0 L 600,250 M 650,0 L 650,250 M 700,0 L 700,250 M 750,0 L 750,250" stroke="#ffffff" stroke-width="1" opacity="0.05" />

  <!-- Main Title -->
  <text x="400" y="115" text-anchor="middle" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="2">
    AWESOME CARTOON AGENTS
  </text>

  <!-- Accent Line under Title -->
  <rect x="250" y="135" width="300" height="4" rx="2" fill="url(#accentGrad)" />

  <!-- Subtitle -->
  <text x="400" y="175" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="500" fill="#e2e8f0" letter-spacing="1">
    🚀 AI-Powered Cartoon, Animation &amp; Character Creation
  </text>
  
  <!-- Badges Container Background -->
  <rect x="260" y="195" width="280" height="25" rx="12.5" fill="#111827" opacity="0.6" />
  <text x="400" y="212" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" letter-spacing="0.5">
    SaaS platforms &amp; Open-Source Projects
  </text>
</svg>
